# .goreleaser.yaml
version: 2
project_name: drive-agent

before:
  hooks:
    - go mod tidy

builds:
  - id: drive-agent
    main: ./cmd/drive-agent
    binary: drive-agent
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/callum-baillie/drive-agent/internal/config.Version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: callum-baillie
    name: drive-agent
